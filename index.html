<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>NASA Quantum OS</title>
</head>
<body class="bg-space">

    <div class="mac-menu-bar">
        <div class="menu-left">
            <span class="menu-item bold">🛰️ Core OS</span>
            <span class="menu-item">Finder</span>
            <span class="menu-item">Terminal</span>
        </div>
        <div class="menu-right">
            <span class="menu-item">📶 100% Uplink</span>
            <span class="menu-item" id="live-clock">--:--</span>
        </div>
    </div>

    <div class="desktop-workspace">
        <div class="desktop-shortcut" onclick="openWindow('weather-window')">
            <div class="icon-wrapper">☁️</div> Weather
        </div>
        </div>

    <div class="mac-window" id="weather-window" style="display:none;">
        <div class="window-header">
            <div class="window-dots"><div class="dot close-btn" onclick="closeWindow('weather-window')"></div></div>
            <div class="window-title">Weather Uplink</div>
        </div>
        <div class="window-body" style="padding: 20px;">
            <button onclick="fetchWeather()" style="cursor:pointer;">SYNC DATA</button>
            <p id="weather-display" style="margin-top:10px;">READY FOR DATA...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
    </html>
