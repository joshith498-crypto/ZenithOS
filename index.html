<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>NASA Quantum OS</title>
</head>
<body>
    <div class="mac-menu-bar">
        <div class="menu-left"><b>🛰️ NASA Quantum OS</b></div>
        <div class="menu-right" id="live-clock">--:--</div>
    </div>

    <div class="desktop-workspace">
        <div class="desktop-shortcut" onclick="openWindow('weather-window')">🌍 Weather App</div>
        <div class="desktop-shortcut" onclick="openWindow('game-window')">🎮 Node Match</div>
    </div>

    <div class="mac-window" id="weather-window" style="display:none; position:absolute; top:50px; left:50px;">
        <button onclick="closeWindow('weather-window')">✕</button>
        <h3>GEO-STATIONARY WEATHER</h3>
        <button onclick="fetchWeather()">INITIALIZE UPLINK</button>
        <p id="weather-display">READY FOR DATA...</p>
    </div>

    <div class="mac-window" id="game-window" style="display:none; position:absolute; top:50px; left:250px;">
        <button onclick="closeWindow('game-window')">✕</button>
        <h3>NODE MATCH PROTOCOL</h3>
        <div id="game-grid"></div>
        <p>SCORE: <span id="score">0</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
