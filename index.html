<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NASA Quantum OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mac-menu-bar">
        <div class="menu-left">
            <span class="menu-item bold">🛰️ Core OS</span>
        </div>
        <div class="menu-right">
            <span class="menu-item" id="live-clock">00:00 AM</span>
        </div>
    </div>

    <div class="desktop-workspace bg-space" id="desktop-bg">
        <div class="desktop-shortcut" id="shortcut-finder"><div class="icon-wrapper">📁</div><span>Finder</span></div>
        <div class="desktop-shortcut" id="shortcut-weather" onclick="document.getElementById('window-weather').style.display='flex'"><div class="icon-wrapper">☁️</div><span>Weather</span></div>
    </div>

    <div class="mac-window" id="window-weather" style="display: none;">
        <div class="window-header"><div class="dot close-btn" onclick="this.closest('.mac-window').style.display='none'"></div><div class="window-title">Weather</div></div>
        <div class="window-body" style="padding:20px; text-align:center;">
            <button onclick="fetchWeather()">SYNC DATA</button>
            <p id="weather-display">Ready...</p>
        </div>
    </div>

    <div class="mac-window" id="window-finder" style="display: none;">
        <div class="window-header"><div class="dot close-btn" onclick="this.closest('.mac-window').style.display='none'"></div><div class="window-title">Finder</div></div>
        <div class="window-body">
            <button onclick="createFinderFile()">+ New File</button>
            <div class="file-grid" id="finder-file-viewport"></div>
        </div>
    </div>

    <div class="dock-container">
        <div class="mac-dock">
            <div class="dock-item" id="dock-finder" data-name="Finder">📁</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
