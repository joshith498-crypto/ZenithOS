<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>NASA Quantum OS</title>
</head>
<body>
    <header class="top-bar">
        <span>🛰️ QUANTUM CONTROL CENTER</span>
        <span id="live-clock">--:--</span>

    <main class="dashboard-grid">
        <section class="card weather-card">
            <h2>🌍 GEO-STATIONARY WEATHER</h2>
            <button onclick="fetchWeather()">INITIALIZE UPLINK</button>
            <div id="weather-display" class="large-text">READY FOR DATA...</div>
        </section>

        <section class="card game-card">
            <h2>🎮 NODE MATCH PROTOCOL</h2>
            <div id="game-grid"></div>
            <p>SYSTEM SCORE: <span id="score">0</span></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
